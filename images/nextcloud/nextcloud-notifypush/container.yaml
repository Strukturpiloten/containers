schemaVersion: 1
name: nextcloud-notifypush
image: ghcr.io/strukturpiloten/nextcloud-notifypush
title: Nextcloud notify_push
description: Nextcloud notify_push binary built from source with a minimal Alpine runtime

build:
  context: .
  containerfile: images/nextcloud/nextcloud-notifypush/Containerfile
  architectures:
    - amd64
    - arm64
  args:
    BASE_IMAGE:
      value: docker.io/rust:1.96.1-alpine3.23@sha256:14b9b5f47dcc6644d0f0c1b35a2c2c5d0124f67159aaee28a348627523459b55
      type: external-image
    RUNTIME_IMAGE:
      value: docker.io/alpine:3.24.1@sha256:28bd5fe8b56d1bd048e5babf5b10710ebe0bae67db86916198a6eec434943f8b
      type: external-image
    NOTIFYPUSH_REPOSITORY:
      value: https://github.com/nextcloud/notify_push.git
      type: static
    NOTIFYPUSH_VERSION:
      value: v1.3.3
      type: static

dependencies:
  internal: []
  external:
    - name: rust
      image: docker.io/rust
      arg: BASE_IMAGE
    - name: alpine
      image: docker.io/alpine
      arg: RUNTIME_IMAGE

inputs:
  - .github/renovate.json
  - .github/workflows/publish-images.yml
  - images/nextcloud/nextcloud-notifypush/**
  - shared/oci-labels.env

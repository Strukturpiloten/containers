name: Publish image
description: Publish one multi-architecture image manifest, sign it, attest it, and upload build metadata.

inputs:
  default-branch:
    description: Repository default branch.
    required: true
  entry:
    description: JSON matrix entry with image name.
    required: true
  syft-version:
    description: Syft version to install.
    required: true
runs:
  using: composite
  steps:
    - name: Install OCI tooling
      shell: bash
      run: |
        set -euo pipefail

        sudo apt-get update
        sudo apt-get install --yes --no-install-recommends podman skopeo

    - name: Download build plan
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: container-build-plan
        path: ${{ runner.temp }}/container-build-plan

    - name: Install uv
      uses: ./.github/actions/setup-uv
      with:
        version: ${{ env.UV_VERSION }}

    - name: Download architecture image archives
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        pattern: "*-oci-archive"
        path: ${{ runner.temp }}/oci-archives
        merge-multiple: true

    - name: Install Syft
      uses: ./.github/actions/setup-syft
      with:
        version: ${{ inputs.syft-version }}

    - name: Install Cosign
      uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      with:
        cosign-release: v3.1.1

    - name: Log in to GitHub Container Registry
      shell: bash
      env:
        GITHUB_TOKEN: ${{ env.GITHUB_TOKEN }}
      run: |
        set -euo pipefail

        printf '%s' "${GITHUB_TOKEN}" | sudo podman login --username "${GITHUB_ACTOR}" --password-stdin ghcr.io

    - name: Publish image
      id: publish
      shell: bash
      env:
        GITHUB_TOKEN: ${{ env.GITHUB_TOKEN }}
      run: |
        set -euo pipefail

        mkdir -p "${RUNNER_TEMP}/image-results"
        uv run --frozen --python "${PYTHON_VERSION}" python -m scripts.container_engine publish-image \
          --plan "${RUNNER_TEMP}/container-build-plan/build-plan.json" \
          --entry-json '${{ inputs.entry }}' \
          --archives-dir "${RUNNER_TEMP}/oci-archives" \
          --output-dir "${RUNNER_TEMP}/image-results"

    - name: Attest build provenance
      uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
      with:
        subject-digest: ${{ steps.publish.outputs.index_digest }}
        subject-name: ${{ steps.publish.outputs.image }}
        push-to-registry: true

    - name: Attest amd64 SBOM
      if: steps.publish.outputs.amd64_digest != ''
      uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
      with:
        subject-digest: ${{ steps.publish.outputs.amd64_digest }}
        subject-name: ${{ steps.publish.outputs.image }}
        sbom-path: ${{ steps.publish.outputs.sbom_amd64 }}
        push-to-registry: true
        create-storage-record: false

    - name: Attest arm64 SBOM
      if: steps.publish.outputs.arm64_digest != ''
      uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
      with:
        subject-digest: ${{ steps.publish.outputs.arm64_digest }}
        subject-name: ${{ steps.publish.outputs.image }}
        sbom-path: ${{ steps.publish.outputs.sbom_arm64 }}
        push-to-registry: true
        create-storage-record: false

    - name: Upload build result
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: ${{ steps.publish.outputs.image_name }}-build-result
        path: ${{ steps.publish.outputs.build_result }}
        if-no-files-found: error
